<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Casa 🏠</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d10;--surface:#18181c;--surface2:#242428;--border:#2e2e34;
  --text:#f0eff5;--muted:#7a7a8c;--purple:#9b79f5;--pdim:#9b79f520;
  --green:#34d399;--orange:#fb923c;--red:#f87171;--blue:#60a5fa;--yellow:#fbbf24;
  --r:14px;--rs:9px;--nav:66px;--hdr:54px;--ease:0.15s ease;
  --cat-groceries:#34d399;--cat-utilities:#60a5fa;--cat-rent:#f87171;
  --cat-dining:#fb923c;--cat-household:#a78bfa;--cat-fun:#f472b6;
  --cat-general:#7a7a8c;--cat-other:#fbbf24;
}
.light{
  --bg:#f5f5f7;--surface:#ffffff;--surface2:#efefef;--border:#dde0e8;
  --text:#111118;--muted:#6b7280;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
#app{height:100%}
button{font-family:inherit}

/* HEADER */
.hdr{position:sticky;top:0;z-index:20;height:var(--hdr);background:var(--surface);
  border-bottom:1px solid var(--border);display:flex;align-items:center;
  justify-content:space-between;padding:0 14px;gap:8px}
.hdr-title{font-size:18px;font-weight:800;letter-spacing:-.3px}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:17px;cursor:pointer;transition:transform var(--ease)}
.hdr-av:active{transform:scale(.9)}
.hdr-badge{position:relative}
.hdr-badge .red-dot{position:absolute;top:-2px;right:-2px;width:9px;height:9px;
  border-radius:50%;background:var(--red);border:2px solid var(--surface)}
.dark-toggle{background:var(--surface2);border:1px solid var(--border);border-radius:20px;
  padding:4px 9px;font-size:13px;cursor:pointer;color:var(--muted)}

/* MAIN */
.main{overflow-y:auto;padding:12px 12px calc(var(--nav)+12px);
  max-width:620px;margin:0 auto;height:calc(100vh - var(--hdr))}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:var(--surface);
  border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);
  z-index:20;max-width:100%}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:10px;font-weight:700;transition:color .18s ease;padding:6px 0;letter-spacing:.02em;
  -webkit-tap-highlight-color:transparent}
.nav-btn .ni{font-size:20px;transition:transform .22s cubic-bezier(.34,1.56,.64,1),font-size .22s cubic-bezier(.34,1.56,.64,1);display:block}
.nav-btn.active{color:var(--purple)}
.nav-btn.active .ni{transform:scale(1.18);font-size:22px}
.nav-btn:not(.active):active .ni{transform:scale(.85)}
.nav-btn .n-badge{background:var(--red);color:#fff;font-size:9px;font-weight:800;
  min-width:16px;height:16px;border-radius:8px;padding:0 4px;
  display:inline-flex;align-items:center;justify-content:center;margin-top:1px}

/* CARD */
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.card+.card,.card+.sh{margin-top:10px}
.cp{padding:14px}

/* SECTION HEADER */
.sh{display:flex;align-items:center;justify-content:space-between;margin:18px 0 8px}
.sh:first-child{margin-top:0}
.sh-t{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;
  border-radius:var(--rs);border:none;cursor:pointer;font-size:14px;font-weight:600;
  transition:opacity .12s ease,transform .12s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.91);opacity:.88}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.28);
  transform:scale(0);animation:ripOut .45s ease;pointer-events:none}
@keyframes ripOut{to{transform:scale(4);opacity:0}}
.btn-p{background:var(--purple);color:#fff}
.btn-g{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:#f8717118;color:var(--red)}
.btn-grn{background:#34d39920;color:var(--green)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:7px}
.btn-full{width:100%;justify-content:center}
.btn-ico{padding:7px;border-radius:50%}

/* FAB */
.fab{position:fixed;bottom:calc(var(--nav)+14px);right:14px;width:54px;height:54px;
  border-radius:50%;background:var(--purple);color:#fff;font-size:26px;border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 24px #9b79f570;z-index:15;
  transition:transform .14s cubic-bezier(.34,1.56,.64,1),box-shadow .14s ease;
  -webkit-tap-highlight-color:transparent}
.fab:active{transform:scale(.86);box-shadow:0 2px 10px #9b79f540}
.fab-enter{animation:fabPop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes fabPop{0%{transform:scale(0)}100%{transform:scale(1)}}

/* INPUTS */
.ig{margin-bottom:12px}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--muted);
  margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.inp{width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--rs);color:var(--text);font-size:15px;padding:10px 12px;
  outline:none;transition:border-color var(--ease);font-family:inherit}
.inp:focus{border-color:var(--purple)}
select.inp{cursor:pointer}
textarea.inp{resize:vertical;min-height:70px}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;
  display:flex;align-items:flex-end}
.mo-box{background:var(--surface);border-radius:20px 20px 0 0;
  padding:16px 16px calc(env(safe-area-inset-bottom)+18px);width:100%;
  max-width:620px;margin:0 auto;max-height:92vh;overflow-y:auto;
  animation:slideUp .2s ease}
@keyframes slideUp{
  0%{transform:translateY(100%) scale(.98);opacity:0}
  55%{transform:translateY(-10px) scale(1.01);opacity:1}
  75%{transform:translateY(4px) scale(.995)}
  100%{transform:translateY(0) scale(1)}
}
.mo-handle{width:40px;height:5px;background:var(--border);border-radius:3px;margin:0 auto 14px;
  cursor:grab;touch-action:none;transition:background var(--ease)}
.mo-handle:active{cursor:grabbing;background:var(--purple)}
.mo-title{font-size:19px;font-weight:800;margin-bottom:14px}

/* AVATAR */
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:16px;flex-shrink:0}
.av-lg{width:44px;height:44px;font-size:21px}

/* LIST ITEM */
.li{display:flex;align-items:center;gap:11px;padding:12px 14px;
  border-bottom:1px solid var(--border);transition:background .12s ease;
  -webkit-tap-highlight-color:transparent}
.li:last-child{border-bottom:none}
.li:active{background:var(--surface2)}

/* SWIPE ROW */
.swipe-wrap{position:relative;overflow:hidden}
.swipe-inner{transition:transform .2s cubic-bezier(.4,0,.2,1);will-change:transform}
.swipe-del-bg{position:absolute;right:0;top:0;bottom:0;width:76px;
  background:var(--red);display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:20px;font-weight:700}
.swipe-inner.swiping{transition:none}

/* BADGE */
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;
  text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.b-red{background:#f8717120;color:var(--red)}
.b-org{background:#fb923c18;color:var(--orange)}
.b-grn{background:#34d39918;color:var(--green)}
.b-pur{background:var(--pdim);color:var(--purple)}

/* CHIP */
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:100px;
  font-size:12px;font-weight:600;background:var(--surface2);border:1px solid var(--border);
  cursor:pointer;transition:var(--ease)}
.chip.on{background:var(--purple);border-color:var(--purple);color:#fff}
.chips{display:flex;flex-wrap:wrap;gap:6px}

/* CATEGORY DOT */
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* TOGGLE */
.tog{display:flex;background:var(--surface2);border-radius:var(--rs);padding:3px;margin-bottom:10px}
.tog-o{flex:1;text-align:center;padding:6px;border-radius:7px;font-size:13px;
  font-weight:600;color:var(--muted);cursor:pointer;transition:var(--ease)}
.tog-o.on{background:var(--purple);color:#fff}

/* CALENDAR */
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-mon{font-size:17px;font-weight:800}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-lbl{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;border-radius:8px;cursor:pointer;font-size:13px;gap:2px;
  transition:background var(--ease);user-select:none}
.cal-day:hover{background:var(--surface2)}
.cal-day.today .cal-n{background:var(--purple);color:#fff;border-radius:50%;
  width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.cal-day.sel{background:var(--pdim)}
.cal-day.dim{opacity:.3;pointer-events:none}
.edots{display:flex;gap:2px}
.edot{width:5px;height:5px;border-radius:50%}

/* RSVP */
.rsvp-row{display:flex;gap:5px;margin-top:7px}
.rsvp-btn{flex:1;padding:6px 4px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--muted);font-size:11px;font-weight:700;
  cursor:pointer;text-align:center;transition:var(--ease);font-family:inherit}
.rsvp-btn.yes.on{background:#34d39920;border-color:var(--green);color:var(--green)}
.rsvp-btn.no.on{background:#f8717118;border-color:var(--red);color:var(--red)}
.rsvp-btn.maybe.on{background:#fb923c18;border-color:var(--orange);color:var(--orange)}

/* WELCOME / SETUP */
.welcome{min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px;text-align:center}
.w-em{font-size:64px;margin-bottom:12px}
.w-title{font-size:30px;font-weight:900;margin-bottom:6px}
.w-sub{color:var(--muted);margin-bottom:24px;font-size:14px}
.mem-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;width:100%;max-width:360px}
.mem-pick{display:flex;align-items:center;gap:10px;padding:13px;background:var(--surface);
  border:2px solid var(--border);border-radius:var(--r);cursor:pointer;font-size:14px;
  font-weight:600;color:var(--text);transition:border-color var(--ease);font-family:inherit}
.mem-pick:active{transform:scale(.96)}
.mem-pick.on{border-color:var(--purple);background:var(--pdim)}

/* COLORS & EMOJIS */
.csws{display:flex;gap:8px;flex-wrap:wrap}
.csw{width:30px;height:30px;border-radius:50%;cursor:pointer;
  border:3px solid transparent;transition:transform var(--ease)}
.csw.on{border-color:#fff;transform:scale(1.18)}
.egrid{display:flex;flex-wrap:wrap;gap:6px}
.eo{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:20px;cursor:pointer;background:var(--surface2);
  border:2px solid transparent;transition:var(--ease)}
.eo.on{border-color:var(--purple)}

/* REACTION BAR */
.rxn-bar{display:flex;flex-wrap:wrap;gap:5px;padding:8px 14px;border-top:1px solid var(--border)}
.rxn{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:100px;
  font-size:13px;background:var(--surface2);border:1px solid var(--border);
  cursor:pointer;transition:var(--ease);font-family:inherit}
.rxn.mine{background:var(--pdim);border-color:var(--purple)}
.rxn-count{font-size:11px;font-weight:700;color:var(--muted)}
.rxn-add{background:none;border:1px dashed var(--border);color:var(--muted)}

/* MATRIX */
.matrix{overflow-x:auto;-webkit-overflow-scrolling:touch}
.mx-table{border-collapse:collapse;width:100%;min-width:280px}
.mx-table td,.mx-table th{padding:7px 10px;text-align:center;font-size:12px;
  border:1px solid var(--border)}
.mx-table th{background:var(--surface2);font-weight:700;white-space:nowrap}
.mx-pos{color:var(--green);font-weight:700}
.mx-neg{color:var(--red);font-weight:700}
.mx-diag{background:var(--surface2);color:var(--muted)}

/* PIE CHART */
.pie-wrap{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.pie-svg{flex-shrink:0}
.pie-legend{display:flex;flex-direction:column;gap:6px;flex:1;min-width:120px}
.pie-leg-row{display:flex;align-items:center;gap:7px;font-size:12px}
.pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* QUICK SPLITS */
.qsplit-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.qs{padding:10px 6px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);font-size:12px;font-weight:600;
  cursor:pointer;text-align:center;line-height:1.4;font-family:inherit;transition:var(--ease)}
.qs:active{transform:scale(.95)}
.qs.sel{background:var(--pdim);border-color:var(--purple);color:var(--purple)}
.qs-em{font-size:20px;display:block;margin-bottom:2px}

/* RECEIPT */
.thumb{width:56px;height:56px;border-radius:8px;object-fit:cover;cursor:pointer;
  flex-shrink:0;border:1px solid var(--border)}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;
  display:flex;align-items:center;justify-content:center;cursor:pointer}
.lightbox img{max-width:95vw;max-height:90vh;border-radius:12px}

/* RECURRING BADGE */
.rec-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;
  font-weight:700;color:var(--blue);background:#60a5fa18;border-radius:100px;padding:2px 6px}

/* SEARCH */
.search-bar{display:flex;gap:8px;margin-bottom:10px}
.search-inp{flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--rs);color:var(--text);font-size:14px;padding:9px 12px;
  outline:none;font-family:inherit}
.search-inp:focus{border-color:var(--purple)}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.stat-c{background:var(--surface2);border-radius:var(--rs);padding:11px 7px;text-align:center}
.stat-v{font-size:18px;font-weight:900}
.stat-l{font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}

/* CHORE CHECK */
.chk{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  flex-shrink:0;transition:transform .18s cubic-bezier(.34,1.56,.64,1),
    border-color .15s ease,background .15s ease;font-size:14px;
  -webkit-tap-highlight-color:transparent}
.chk:hover{border-color:var(--purple)}
.chk:active{transform:scale(.78)}
.chk.done{background:var(--green);border-color:var(--green);color:#fff;
  animation:chorePop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes chorePop{0%{transform:scale(0)}100%{transform:scale(1)}}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav)+76px);left:50%;transform:translateX(-50%);
  background:rgba(20,20,24,.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  color:#fff;padding:10px 22px;border-radius:100px;font-size:13px;
  font-weight:700;z-index:300;white-space:nowrap;pointer-events:none;
  box-shadow:0 4px 24px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.08)}
.toast-enter{animation:tIn .22s cubic-bezier(.34,1.56,.64,1)}
.toast-exit{animation:tOut .2s ease forwards}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(16px) scale(.85)}
               to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
@keyframes tOut{to{opacity:0;transform:translateX(-50%) translateY(-8px) scale(.92)}}

/* SETUP FLOW */
.setup-names{display:flex;flex-direction:column;gap:8px;width:100%;max-width:360px}
.setup-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* MISC */
.owe{color:var(--red)}.owed{color:var(--green)}
.trunc{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{text-align:center;padding:36px 16px;color:var(--muted)}
.empty .ee{font-size:46px;margin-bottom:8px}
.empty p{font-size:13px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.spin{display:flex;align-items:center;justify-content:height:200px}
.sp{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--purple);
  border-radius:50%;animation:rot .7s linear infinite;margin:80px auto}
@keyframes rot{to{transform:rotate(360deg)}}
.ptabs{display:flex;gap:6px;margin-bottom:12px}
.ptab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;
  border-radius:var(--rs);background:var(--surface2);color:var(--muted);
  cursor:pointer;border:1px solid var(--border);transition:var(--ease)}
.ptab.on{background:var(--purple);color:#fff;border-color:var(--purple)}
@media(min-width:600px){.main{padding:18px 18px calc(var(--nav)+18px)}}

/* PAGE TRANSITIONS */
.page-enter{animation:pgIn .24s cubic-bezier(.4,0,.2,1)}
.page-back{animation:pgBack .24s cubic-bezier(.4,0,.2,1)}
@keyframes pgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pgBack{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* SKELETON LOADING */
.skel{border-radius:8px;background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{to{background-position:-200% 0}}
.skel-line{height:13px;margin-bottom:8px}
.skel-title{height:18px;width:55%;margin-bottom:6px}
.skel-sub{height:11px;width:38%;opacity:.7}

/* CARD ENTRANCE */
.card-enter{animation:cardIn .3s cubic-bezier(.34,1.2,.64,1)}
@keyframes cardIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}

/* PULL TO REFRESH */
.ptr{display:flex;align-items:center;justify-content:center;
  height:0;overflow:hidden;transition:height .2s ease;color:var(--muted);font-size:13px;gap:8px}
.ptr.active{height:48px}
.ptr-spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--purple);
  border-radius:50%;animation:rot .6s linear infinite}
.ptr-arrow{font-size:20px;transition:transform .3s ease;display:inline-block}
.ptr-arrow.ready{transform:rotate(180deg)}

/* ANIMATED NUMBER */
.num-anim{transition:all .4s cubic-bezier(.4,0,.2,1)}

/* HERO BALANCE PULSE */
.hero-balance{transition:transform .3s cubic-bezier(.34,1.56,.64,1),color .3s ease}
.hero-balance.updated{animation:balPulse .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes balPulse{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}

/* BETTER INPUTS */
.inp{transition:border-color .15s ease,box-shadow .15s ease}
.inp:focus{border-color:var(--purple);box-shadow:0 0 0 3px #9b79f520}

/* CALENDAR DAY POP */
.cal-day{transition:background .12s ease,transform .14s cubic-bezier(.34,1.56,.64,1)}
.cal-day:active{transform:scale(.88)}
.cal-day.sel{animation:dayPop .22s cubic-bezier(.34,1.56,.64,1)}
@keyframes dayPop{0%{transform:scale(.8)}100%{transform:scale(1)}}

/* MEM PICK */
.mem-pick{transition:border-color .15s ease,background .15s ease,transform .15s cubic-bezier(.34,1.56,.64,1)}
.mem-pick:active{transform:scale(.93)}

/* CHIP */
.chip{transition:background .15s ease,border-color .15s ease,transform .14s cubic-bezier(.34,1.56,.64,1),color .15s ease}
.chip:active{transform:scale(.88)}

/* RSVP BUTTONS */
.rsvp-btn{transition:background .15s ease,border-color .15s ease,color .15s ease,transform .14s cubic-bezier(.34,1.56,.64,1)}
.rsvp-btn:active{transform:scale(.88)}

/* EMOJI PICKER */
.eo{transition:border-color .14s ease,transform .18s cubic-bezier(.34,1.56,.64,1),background .14s ease}
.eo:active{transform:scale(.8)}
.eo.on{transform:scale(1.12);border-color:var(--purple)}

/* QS SPLIT BUTTONS */
.qs{transition:background .15s ease,border-color .15s ease,color .15s ease,transform .16s cubic-bezier(.34,1.56,.64,1)}
.qs:active{transform:scale(.9)}

const LS = {

// ══ API ════════════════════════════════════════════════════════════════════
async function api(m, p, b) {
  const o = {method:m, headers:{'Content-Type':'application/json'}};
  if (b !== undefined) o.body = JSON.stringify(b);
  try {
    const r = await fetch('/api'+p, o);
    if (r.status === 204) return null;
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Error');
    return d;
  } catch(e) { toast('❌ '+e.message); throw e; }
}

async function reload(parts=['all']) {
  const all = parts.includes('all');
  const ps = [];
  if (all||parts.includes('members'))     ps.push(api('GET','/members').then(d=>{S.members=d}));
  if (all||parts.includes('expenses'))    ps.push(api('GET','/expenses').then(d=>{S.expenses=d}));
  if (all||parts.includes('balances'))    ps.push(api('GET','/balances').then(d=>{S.balances=d}));
  if (all||parts.includes('chores'))      ps.push(api('GET','/chores').then(d=>{S.chores=d}));
  if (all||parts.includes('events'))      ps.push(api('GET',`/events?year=${S.calY}&month=${S.calM}`).then(d=>{S.events=d}));
  if (all||parts.includes('stats'))       ps.push(api('GET','/stats').then(d=>{S.stats=d}));
  if (all||parts.includes('settlements')) ps.push(api('GET','/settlements').then(d=>{S.settlements=d}));
  if (all||parts.includes('recurring'))   ps.push(api('GET','/recurring').then(d=>{S.recurring=d}));
  await Promise.all(ps);
}

// ══ HAPTIC ═════════════════════════════════════════════════════════════════
function haptic(style='light') {
  try {
    if (window.navigator?.vibrate) {
      window.navigator.vibrate(style==='heavy'?[12,6,18]:style==='medium'?10:6);
    }
  } catch {}
}

// ══ RIPPLE ═════════════════════════════════════════════════════════════════
function addRipple(btn, e) {
  const r = document.createElement('span'); r.className='ripple';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const x = (e.clientX||rect.left+rect.width/2) - rect.left - size/2;
  const y = (e.clientY||rect.top+rect.height/2) - rect.top - size/2;
  Object.assign(r.style, {width:size+'px',height:size+'px',left:x+'px',top:y+'px'});
  btn.appendChild(r);
  r.addEventListener('animationend', ()=>r.remove());
}
// Attach ripple to all .btn-p and .btn-grn clicks (delegated)
document.addEventListener('click', e=>{
  const btn = e.target.closest('.btn-p,.btn-grn,.fab');
  if (btn) { addRipple(btn, e); haptic('light'); }
});

// ══ ANIMATED COUNTER ═══════════════════════════════════════════════════════
function animateValue(el, from, to, duration=600) {
  if (!el) return;
  const start = performance.now();
  const update = now => {
    const t = Math.min((now-start)/duration, 1);
    const ease = 1-Math.pow(1-t,3); // easeOutCubic
    const val = from + (to-from)*ease;
    el.textContent = '$'+Math.abs(val).toFixed(2);
    if (t<1) requestAnimationFrame(update);
  };
  requestAnimationFrame(update);
}

// ══ SKELETON ═══════════════════════════════════════════════════════════════
function skeletonCards(n=3) {
  return Array(n).fill(0).map(()=>`
    <div class="card cp" style="margin-bottom:10px">
      <div class="skel skel-title"></div>

}

// ══ TOAST ══════════════════════════════════════════════════════════════════
let _toastT;
function toast(msg, type='') {
  clearTimeout(_toastT);
  let t = document.querySelector('.toast');
  if (!t) { t=document.createElement('div'); t.className='toast'; document.body.appendChild(t); }
  t.textContent = msg; t.style.display='block';
  t.classList.remove('toast-exit'); t.classList.add('toast-enter');
  void t.offsetWidth; // reflow
  _toastT = setTimeout(()=>{
    t.classList.add('toast-exit');
    setTimeout(()=>{ if(t) t.style.display='none'; t.classList.remove('toast-enter','toast-exit'); }, 220);
  }, 2400);
}

// ══ MODAL ══════════════════════════════════════════════════════════════════
function showModal(html, onShow) {
  closeModal();
  const el = document.createElement('div'); el.className='mo'; el.id='mo';
  el.innerHTML = `<div class="mo-box" id="mo-box"><div class="mo-handle" id="mo-handle"></div>${html}</div>`;
  document.body.appendChild(el);

  // Tap backdrop to close
  el.addEventListener('click', e=>{ if(e.target===el) dismissModal(); });

  // Drag-to-dismiss on handle
  const box = el.querySelector('#mo-box');
  const handle = el.querySelector('#mo-handle');
  let startY=0, dy=0, dragging=false;

  function onStart(e) {
    startY = (e.touches?e.touches[0].clientY:e.clientY);
    dy=0; dragging=true;
    box.style.transition='none';
  }
  function onMove(e) {
    if (!dragging) return;
    const cy = (e.touches?e.touches[0].clientY:e.clientY);
    dy = Math.max(0, cy-startY);
    box.style.transform = `translateY(${dy}px)`;
    el.style.background = `rgba(0,0,0,${Math.max(0,.75-dy/400)})`;
    if (e.cancelable) e.preventDefault();
  }
  function onEnd() {
    if (!dragging) return; dragging=false;
    box.style.transition='';
    if (dy > 120) { dismissModal(); } else {
      box.style.transform='';
      el.style.background='';
    }
    dy=0;
  }

  // Also allow dragging anywhere in the box header area (first 60px)
  box.addEventListener('touchstart', e=>{
    if (e.target.closest('input,textarea,select,button,a')) return;
    if (e.touches[0].clientY - box.getBoundingClientRect().top < 60) onStart(e);
  }, {passive:true});
  handle.addEventListener('touchstart', onStart, {passive:true});
  handle.addEventListener('mousedown', onStart);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('touchend', onEnd);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onEnd);

  if (onShow) onShow();
}

function dismissModal() {
  const mo = document.getElementById('mo');
  const box = document.getElementById('mo-box');
  if (!mo||!box) return;
  haptic('light');
  box.style.transition='transform .22s cubic-bezier(.4,0,1,1),opacity .22s ease';
  box.style.transform='translateY(110%)';
  box.style.opacity='0';
  mo.style.transition='background .22s ease';
  mo.style.background='rgba(0,0,0,0)';
  setTimeout(()=>mo.remove(), 230);
}
function closeModal() { dismissModal(); }

// ══ HELPERS ════════════════════════════════════════════════════════════════
const $ = (s,el=document)=>el.querySelector(s);
const $$ = (s,el=document)=>[...el.querySelectorAll(s)];
const fmt = n=>'$'+Math.abs(+n||0).toFixed(2);
const memBy = id=>S.members.find(m=>m.id===id);
const av = (m,cls='av')=>`<div class="${cls}" style="background:${m.color}22;color:${m.color}">${m.emoji}</div>`;
const fmtDate = d=>d?new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):''
const todayStr = ()=>new Date().toISOString().slice(0,10);
function equalSplits(amount, memberIds) {
  const n = memberIds.length; if(!n) return [];
  const base = Math.floor(amount/n*100)/100;
  const rem  = parseFloat((amount - base*n).toFixed(2));
  return memberIds.map((id,i)=>({member_id:id, amount:i===0?parseFloat((base+rem).toFixed(2)):base}));
}
function unsettledBadge(memberId) {

// ══ RENDER ═════════════════════════════════════════════════════════════════
let _prevView = null;
const VIEW_ORDER = ['dashboard','expenses','chores','calendar','settings'];

function render() {
  const app = document.getElementById('app');
  if (S.loading) {
    app.innerHTML = `
      <div style="padding:14px">
        <div style="height:54px;margin-bottom:14px" class="skel" style="border-radius:0"></div>

  }
  if (!S.me) { app.innerHTML = S.members.length ? renderWelcome() : renderSetup(); bindWelcome(); return; }

  ];
  const hasDebt = S.balances.simplified_debts.some(d=>d.from_id===S.me?.id||d.to_id===S.me?.id);

  // Determine transition direction
  const prevIdx = VIEW_ORDER.indexOf(_prevView);
  const currIdx = VIEW_ORDER.indexOf(S.view);

          <span class="ni">${i}</span>
          ${v==='expenses'&&hasDebt?`<span class="n-badge">!</span>`:`<span>${l}</span>`}
        </button>`).join('')}

    $('#dark-btn').onclick = ()=>{ S.darkMode=!S.darkMode; LS.set('casa_dark',S.darkMode); applyDarkMode(); render(); };
    $('#hdr-av').onclick = ()=>showMemberPicker();
    $$('[data-v]').forEach(b=>b.onclick=()=>{
      if (b.dataset.v===S.view) return;
      haptic('light');
      _prevView=S.view; S.view=b.dataset.v; S.sub='list'; render();
    });
  } else {
    // Update header avatar in place
    const av = $('#hdr-av');
    if (av) { av.textContent=S.me.emoji; av.style.background=S.me.color+'22'; av.style.color=S.me.color; }
    // Update nav active states
    $$('[data-v]').forEach(b=>{
      b.classList.toggle('active', b.dataset.v===S.view);
      // Update debt badge
      if (b.dataset.v==='expenses') {
        const sp=b.querySelector('span:not(.ni)');
        if(sp) sp.outerHTML = hasDebt?`<span class="n-badge">!</span>`:`<span>Expenses</span>`;
      }
    });
  }

  // Update page content with transition
  const main = document.getElementById('main-content');
  if (main) {
    main.className = 'main ' + transClass;
    main.innerHTML = renderView();
    // Force reflow for animation
    void main.offsetWidth;
  }
  _prevView = S.view;
  bindView();
  setupPullToRefresh();
}

// ══ PULL TO REFRESH ════════════════════════════════════════════════════════
function setupPullToRefresh() {
  const main = document.getElementById('main-content');
  if (!main) return;

  // Inject PTR indicator at top
  if (!main.querySelector('.ptr')) {
    const ptr = document.createElement('div'); ptr.className='ptr'; ptr.id='ptr';
    ptr.innerHTML=`<div class="ptr-spin"></div><span>Release to refresh</span>`;
    main.insertBefore(ptr, main.firstChild);
  }

  let startY=0, pulling=false, triggered=false;
  main.addEventListener('touchstart', e=>{
    if (main.scrollTop===0) { startY=e.touches[0].clientY; pulling=true; triggered=false; }
  },{passive:true});
  main.addEventListener('touchmove', e=>{
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    const ptr = document.getElementById('ptr');
    if (dy>10 && main.scrollTop===0) {
      ptr.classList.toggle('active', dy>48);
      if (dy>80 && !triggered) {
        triggered=true; haptic('medium');
        ptr.querySelector('span').textContent='Refreshing…';
      }
    }
  },{passive:true});
  main.addEventListener('touchend', async()=>{
    if (!pulling) return; pulling=false;
    const ptr = document.getElementById('ptr');
    if (triggered) {
      await reload(); render(); toast('Updated ✓');
    } else { if(ptr){ptr.classList.remove('active');} }
  },{passive:true});
}

function renderView() {
  if (S.view==='dashboard') return renderDashboard();
  if (S.view==='expenses')  return renderExpenses();
  if (S.view==='chores')    return renderChores();
  if (S.view==='calendar')  return renderCalendar();
  if (S.view==='settings')  return renderSettings();
  return '';
}
function bindView() {
  if (S.view==='dashboard') bindDashboard();
  if (S.view==='expenses')  bindExpenses();
  if (S.view==='chores')    bindChores();
  if (S.view==='calendar')  bindCalendar();
  if (S.view==='settings')  bindSettings();
}

function renderMatrix() {
  const {net_balances} = S.balances;
  if (!S.members.length) return '<p style="color:var(--muted);text-align:center">Add members first</p>';
  // Build pairwise net from expenses+settlements
  const pair = {}; // pair[a][b] = a owes b this much (positive)
  S.members.forEach(m=>{ pair[m.id]={} ; S.members.forEach(n=>{ if(m.id!==n.id) pair[m.id][n.id]=0; }); });

  S.expenses.forEach(e=>{
    e.splits?.forEach(s=>{
      if (s.member_id !== e.paid_by) {
        pair[s.member_id][e.paid_by] = (pair[s.member_id][e.paid_by]||0) + s.amount;
      }
    });
  });
  S.settlements.forEach(s=>{
    pair[s.from_member][s.to_member] = Math.max(0,(pair[s.from_member]?.[s.to_member]||0) - s.amount);
  });

  return `<table class="mx-table">
    <tr><th>↓ owes →</th>${S.members.map(m=>`<th>${m.emoji}<br>${m.name.split(' ')[0]}</th>`).join('')}</tr>
    ${S.members.map(m=>`<tr>
      <th style="text-align:left">${m.emoji} ${m.name.split(' ')[0]}</th>
      ${S.members.map(n=>{
        if (m.id===n.id) return `<td class="mx-diag">—</td>`;
        const v = pair[m.id]?.[n.id]||0;
        if (v < 0.01) return `<td style="color:var(--muted)">—</td>`;
        return `<td class="mx-neg">${fmt(v)}</td>`;
      }).join('')}
    </tr>`).join('')}
  </table>`;
}

function renderPie(catMap) {
  const entries = Object.entries(catMap).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const total = entries.reduce((s,[,v])=>s+v,0);
  if (!total) return '';
  const size = 110, cx=size/2, cy=size/2, r=42, stroke=22;
  let angle = -Math.PI/2;
  let slices = '';
  entries.forEach(([cat, val]) => {
    const sweep = (val/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+sweep), y2=cy+r*Math.sin(angle+sweep);
    const lg = sweep>Math.PI?1:0;
    slices += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${lg} 1 ${x2},${y2} Z"
      fill="${CAT_COLORS[cat]||'#888'}" opacity=".85"/>`;
    angle += sweep;
  });
  return `<div class="pie-wrap">
    <svg class="pie-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="var(--surface2)"/>
      ${slices}
      <circle cx="${cx}" cy="${cy}" r="${r-stroke}" fill="var(--surface)"/>
    </svg>
    <div class="pie-legend">
      ${entries.map(([cat,val])=>`
        <div class="pie-leg-row">
          <div class="pie-dot" style="background:${CAT_COLORS[cat]||'#888'}"></div>
          <span style="flex:1;font-size:12px">${CATS[cat]||''} ${cat}</span>
          <span style="font-weight:700;font-size:12px">${fmt(val)}</span>
        </div>`).join('')}
    </div>
  </div>`;
}

function setupSwipeToDelete() {
  $$('[data-eid]').forEach(row=>{
    let sx=0, dx=0, swiping=false;
    const THRESH = 72;

    // Inject delete bg if not present
    if (!row.querySelector('.swipe-del-bg')) {
      const bg=document.createElement('div'); bg.className='swipe-del-bg'; bg.textContent='🗑';
      row.style.position='relative'; row.style.overflow='hidden';
      row.insertBefore(bg, row.firstChild);
    }

    row.addEventListener('touchstart', e=>{
      sx=e.touches[0].clientX; dx=0; swiping=true;
      row.style.transition='none';
    },{passive:true});
    row.addEventListener('touchmove', e=>{
      if (!swiping) return;
      dx=Math.min(0, e.touches[0].clientX - sx); // only left swipe
      if (Math.abs(dx)>6) row.style.transform=`translateX(${dx}px)`;
    },{passive:true});
    row.addEventListener('touchend', async()=>{
      if (!swiping) return; swiping=false;
      row.style.transition='transform .2s cubic-bezier(.4,0,.2,1)';
      if (dx < -THRESH) {
        haptic('heavy');
        row.style.transform='translateX(-110%)';
        row.style.transition='transform .22s ease,opacity .22s ease,max-height .28s ease';
        row.style.opacity='0';
        row.style.maxHeight='0';
        row.style.overflow='hidden';
        const eid=parseInt(row.dataset.eid);
        try{
          await api('DELETE',`/expenses/${eid}`);
          await reload(['expenses','balances','stats']);
          render(); toast('Expense deleted');
        }catch{ render(); }
      } else {
        row.style.transform='';
      }
    },{passive:true});
  });
}

function bindHistory() {
  let selMem=null, sortMode='desc';
  function applyFilter() {
    const q=$('#hist-q')?.value.toLowerCase()||'';
    const cat=$('#hist-cat')?.value||'';
    let exps = S.expenses.filter(e=>{
      if(q && !e.description.toLowerCase().includes(q) && !(e.payer_name||'').toLowerCase().includes(q)) return false;
      if(cat && e.category!==cat) return false;
      if(selMem && !e.splits?.some(s=>s.member_id===selMem) && e.paid_by!==selMem) return false;
      return true;
    });
    if(sortMode==='asc') exps=[...exps].sort((a,b)=>a.date<b.date?-1:1);
    else if(sortMode==='amt') exps=[...exps].sort((a,b)=>b.amount-a.amount);
    const r=$('#hist-results'); if(r) r.innerHTML=renderFilteredExpenses(exps);
    // rebind delete/reaction
    $$('[data-del]','#hist-results').forEach(b=>b.onclick=async()=>{
      if(!confirm('Delete?')) return;
      await api('DELETE',`/expenses/${b.dataset.del}`); await reload(['expenses','balances']); render(); toast('Deleted');
    });
    $$('[data-rxn]','#hist-results').forEach(b=>b.onclick=()=>toggleReaction(parseInt(b.dataset.rxn),b.dataset.em));
  }
  $('#hist-q')?.addEventListener('input', applyFilter);
  $('#hist-cat')?.addEventListener('change', applyFilter);
  $$('[data-fmem]').forEach(c=>c.onclick=()=>{
    const id=parseInt(c.dataset.fmem); selMem = selMem===id?null:id;
    $$('[data-fmem]').forEach(x=>x.classList.toggle('on',parseInt(x.dataset.fmem)===selMem)); applyFilter();
  });
  $$('[data-sort]').forEach(c=>c.onclick=()=>{
    sortMode=c.dataset.sort; $$('[data-sort]').forEach(x=>x.classList.toggle('on',x.dataset.sort===sortMode)); applyFilter();
  });
}

function toggleReaction(eid, emoji) {
  if (!S.me) { toast('Select yourself first'); return; }
  const rxns = S.reactions[eid] = S.reactions[eid]||{};
  rxns[emoji] = rxns[emoji]||[];
  const idx = rxns[emoji].indexOf(S.me.id);
  if (idx>-1) rxns[emoji].splice(idx,1); else rxns[emoji].push(S.me.id);
  if (!rxns[emoji].length) delete rxns[emoji];
  LS.set('casa_reactions', S.reactions); render();
}

function promptReceipt(eid) {
  const inp = document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange = ()=>{

  let pendingReceipt = null;

  function updateExtra() {
    const ex = $('#qsp-extra');
    if (!ex) return;
    if (splitMode==='present') {
      ex.innerHTML = `<div class="ig"><label class="lbl">Who's splitting?</label>
        <div class="chips">${S.members.map(m=>`<div class="chip ${presentIds.includes(m.id)?'on':''}" data-pid="${m.id}">${m.emoji} ${m.name.split(' ')[0]}</div>`).join('')}</div></div>`;
      $$('[data-pid]').forEach(c=>c.onclick=()=>{
        const id=parseInt(c.dataset.pid);
        if(presentIds.includes(id)) presentIds=presentIds.filter(x=>x!==id); else presentIds.push(id);
        c.classList.toggle('on');updatePreview();
      });
    } else if (splitMode==='two') {
      ex.innerHTML = `<div class="ig"><label class="lbl">Split with</label>
        <select class="inp" id="two-other">
          ${S.members.filter(m=>m.id!==S.me?.id).map(m=>`<option value="${m.id}">${m.emoji} ${m.name}</option>`).join('')}
        </select></div>`;
      $('#two-other')?.addEventListener('change', updatePreview);
    } else { ex.innerHTML=''; }
    updatePreview();
  }

  function getTargetIds() {
    if (splitMode==='all5') return S.members.map(m=>m.id);
    if (splitMode==='present') return presentIds.length?presentIds:S.members.map(m=>m.id);
    if (splitMode==='two') { const oth=parseInt($('#two-other')?.value||0); return [S.me?.id,oth].filter(Boolean); }
    return S.members.map(m=>m.id);
  }

  function updatePreview() {
    const amt=parseFloat($('#ea')?.value)||0;
    const ids=getTargetIds();
    const splits=equalSplits(amt,ids);
    const pv=$('#split-preview'); if(!pv) return;
    pv.innerHTML = `<div class="card" style="margin-bottom:10px">${S.members.filter(m=>ids.includes(m.id)).map((m,i)=>{
      const s=splits[i]; return `<div class="li" style="padding:9px 14px">${av(m)}
        <span style="flex:1;font-size:14px;margin-left:5px">${m.name}</span>
        <span style="font-weight:700">${fmt(s?.amount||0)}</span></div>`;
    }).join('')}</div>`;
  }

  $('#ea')?.addEventListener('input', updatePreview);
  $$('[data-qsp]').forEach(b=>b.onclick=()=>{
    splitMode=b.dataset.qsp;
    $$('[data-qsp]').forEach(x=>x.classList.toggle('sel',x.dataset.qsp===splitMode));
    if(splitMode==='all5') { presentIds=S.members.map(m=>m.id); }
    updateExtra();
  });

  $('#attach-receipt')?.addEventListener('click', ()=>{
    const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
    inp.onchange=()=>{
      const file=inp.files[0]; if(!file) return;
      const reader=new FileReader();
      reader.onload=e=>{ pendingReceipt=e.target.result; const s=$('#receipt-status'); if(s) s.textContent='✓ Receipt ready'; };
      reader.readAsDataURL(file);
    }; inp.click();
  });

  updateExtra();

  $('#save-exp').onclick = async()=>{
    const desc=$('#ed')?.value.trim(), amt=parseFloat($('#ea')?.value);
    const paid_by=parseInt($('#ep')?.value), category=$('#ec')?.value;
    const date=$('#edt')?.value, notes=$('#enotes')?.value.trim()||null;
    if(!desc||!amt||amt<=0){toast('Enter description and amount');return;}
    const ids=getTargetIds();
    if(!ids.length){toast('Select at least one person');return;}
    const splits=equalSplits(amt,ids);
    try{
      const exp = await api('POST','/expenses',{description:desc,amount:amt,paid_by,category,date,notes,splits});
      if(pendingReceipt){ S.receipts[exp.id]=pendingReceipt; LS.set('casa_receipts',S.receipts); }
      haptic('medium');
      closeModal(); await reload(['expenses','balances','stats']); render(); toast('✓ Expense added!');
    }catch{}
  };
}

// ══ CALENDAR ═══════════════════════════════════════════════════════════════
function renderCalendar() {
  const {calY:y,calM:m}=S;
  const mname=new Date(y,m-1,1).toLocaleString('default',{month:'long',year:'numeric'});
  const first=new Date(y,m-1,1).getDay(), days=new Date(y,m,0).getDate();
  const today=new Date(); const [ty,tm,td]=[today.getFullYear(),today.getMonth()+1,today.getDate()];
  const byDate={};
  S.events.forEach(e=>{(byDate[e.event_date]=byDate[e.event_date]||[]).push(e);});
  const prev=new Date(y,m-1,0).getDate();
  let cells='';
  for(let i=first-1;i>=0;i--) cells+=`<div class="cal-day dim"><span class="cal-n">${prev-i}</span></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ty===y&&tm===m&&td===d, isSel=S.calDay===ds;
    const evs=byDate[ds]||[];
    cells+=`<div class="cal-day ${isT?'today':''} ${isSel?'sel':''}" data-cday="${ds}">
      <span class="cal-n">${d}</span>
      ${evs.length?`<div class="edots">${evs.slice(0,3).map(e=>`<div class="edot" style="background:${e.color||e.creator_color||'var(--purple)'}"></div>`).join('')}</div>`:''}
    </div>`;
  }
  const selEvs=S.calDay?(byDate[S.calDay]||[]):[];
  const upcoming=S.events.filter(e=>e.event_date>=todayStr()).slice(0,8);
  return `
    <div class="card cp">
      <div class="cal-hdr">
        <button class="btn btn-g btn-sm" id="cal-prev">‹</button>
        <span class="cal-mon">${mname}</span>
        <button class="btn btn-g btn-sm" id="cal-next">›</button>
      </div>
      <div class="cal-grid">
        ${['Su','Mo','Tu','We','Th','Fr','Sa'].map(l=>`<div class="cal-lbl">${l}</div>`).join('')}
        ${cells}
      </div>
    </div>
    ${S.calDay?`
    <div class="sh">
      <span class="sh-t">${fmtDate(S.calDay)}</span>
      <button class="btn btn-p btn-sm" id="add-ev-day">+ Event</button>
    </div>
    ${selEvs.length?`<div class="card">${selEvs.map(renderEventRow).join('')}</div>`:
      `<div class="card cp" style="text-align:center;color:var(--muted)">No events — add one!</div>`}`:''}
    <div class="sh"><span class="sh-t">Upcoming Events</span></div>
    ${upcoming.length?`<div class="card">${upcoming.map(renderEventRow).join('')}</div>`:
      `<div class="empty"><div class="ee">📅</div><p>No upcoming events</p></div>`}
    <button class="fab" id="fab-ev">+</button>`;
}

function renderEventRow(e) {
  const color=e.color||e.creator_color||'var(--purple)';
  const myR=e.rsvps?.find(r=>r.member_id===S.me?.id);

  const mayC=e.rsvps?.filter(r=>r.status==='maybe').length||0;
  return `<div class="li" style="align-items:flex-start">
    <div style="width:8px;height:8px;border-radius:50%;background:${color};margin-top:6px;flex-shrink:0"></div>

      <div style="font-size:11px;color:var(--muted);margin-top:2px">

  $('#cal-prev')?.addEventListener('click', async()=>{ S.calM--; if(S.calM<1){S.calM=12;S.calY--;} S.calDay=null; await reload(['events']); render(); });

    </div>

    <!-- MEMBERS -->
    <div class="sh"><span class="sh-t">Roommates</span>
      <button class="btn btn-p btn-sm" id="add-mem-btn">+ Add</button>
    </div>
    ${S.stats.length?`<div class="card">${S.stats.map(m=>`
      <div class="li">
        <div class="av av-lg" style="background:${m.color}22;color:${m.color}">${m.emoji}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px">${m.name}${m.id===S.me?.id?' <span style="font-size:10px;color:var(--purple)">(you)</span>':''}</div>
          <div style="font-size:11px;color:var(--muted)">Paid ${fmt(m.total_paid)} · Share ${fmt(m.total_split)} · ${m.chores_done} chores ✓</div>
          ${unsettledBadge(m.id)?`<button class="btn btn-g btn-sm" data-remind3="${m.id}" data-n3="${m.name}" style="margin-top:3px">📋 Remind</button>`:''}
        </div>
        <div style="display:flex;gap:5px;flex-shrink:0">
          <button class="btn btn-g btn-sm" data-edit-m="${m.id}">✏️</button>
          ${m.id!==S.me?.id?`<button class="btn btn-danger btn-sm" data-del-m="${m.id}">🗑</button>`:''}
        </div>
      </div>`).join('')}</div>`:
    `<div class="empty"><div class="ee">👥</div><p>No members yet</p></div>`}

    <!-- MONTHLY REPORT -->
    <div class="sh"><span class="sh-t">Monthly Summary</span></div>
    <div class="card cp" id="monthly-summary">
      ${renderMonthlySummary()}
    </div>

    <!-- DATA EXPORT / IMPORT -->
    <div class="sh"><span class="sh-t">Data</span></div>
    <div class="card cp" style="display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-g btn-full" id="export-btn">⬇️ Export all data as JSON</button>
      <button class="btn btn-g btn-full" id="import-btn">⬆️ Import from JSON</button>
      <input type="file" id="import-file" accept=".json" style="display:none">
      <button class="btn btn-g btn-full" id="export-csv-btn">📊 Export this month as CSV</button>
      <button class="btn btn-danger btn-full" id="reset-me-btn">🚪 Log out (switch user)</button>
    </div>

    <!-- DARK MODE -->
    <div class="sh"><span class="sh-t">Appearance</span></div>
    <div class="card cp" style="display:flex;align-items:center;justify-content:space-between">
      <span style="font-weight:600">${S.darkMode?'🌙 Dark mode':'☀️ Light mode'}</span>
      <button class="btn btn-g btn-sm" id="dark-btn2">${S.darkMode?'Switch to Light':'Switch to Dark'}</button>
    </div>
  `;
}

function renderMonthlySummary() {
  const today=new Date(); const [ty,tm]=[today.getFullYear(),today.getMonth()+1];
  const monthExps=S.expenses.filter(e=>e.date?.startsWith(`${ty}-${String(tm).padStart(2,'0')}`));
  const total=monthExps.reduce((s,e)=>s+e.amount,0);
  const biggest=monthExps.length?monthExps.reduce((a,b)=>b.amount>a.amount?b:a,monthExps[0]):null;
  const spenderMap={};
  monthExps.forEach(e=>{ spenderMap[e.paid_by]=(spenderMap[e.paid_by]||0)+e.amount; });
  const topSpenderId=Object.keys(spenderMap).sort((a,b)=>spenderMap[b]-spenderMap[a])[0];
  const topSpender=topSpenderId?memBy(parseInt(topSpenderId)):null;
  return `
    <div style="font-size:13px;font-weight:700;margin-bottom:10px">
      ${new Date(ty,tm-1,1).toLocaleString('default',{month:'long',year:'numeric'})}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <div class="stat-c"><div class="stat-v">${fmt(total)}</div><div class="stat-l">Total spent</div></div>
      <div class="stat-c"><div class="stat-v">${monthExps.length}</div><div class="stat-l">Expenses</div></div>
    </div>
    ${biggest?`<div style="font-size:12px;margin-bottom:5px"><span style="color:var(--muted)">Biggest expense:</span> <strong>${biggest.description}</strong> ${fmt(biggest.amount)}</div>`:''}
    ${topSpender?`<div style="font-size:12px;margin-bottom:10px"><span style="color:var(--muted)">Most active spender:</span> ${topSpender.emoji} <strong>${topSpender.name}</strong> ${fmt(spenderMap[topSpenderId])}</div>`:''}
    ${S.members.map(m=>{
      const share=monthExps.reduce((s,e)=>{ const sp=e.splits?.find(x=>x.member_id===m.id); return s+(sp?.amount||0); },0);
      return `<div style="display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:4px">${av(m)}<span style="flex:1">${m.name}</span><span style="font-weight:700">${fmt(share)}</span></div>`;
    }).join('')}
    <button class="btn btn-g btn-full btn-sm" id="export-csv-inline" style="margin-top:10px">📊 Export CSV</button>
  `;
}

function bindSettings() {
  $('#add-mem-btn')?.addEventListener('click', showAddMemberModal);
  $('#edit-me-btn')?.addEventListener('click', ()=>{ if(S.me) showEditMemberModal(S.me); });
  $$('[data-edit-m]').forEach(b=>b.onclick=()=>{ const m=memBy(parseInt(b.dataset.editM)); if(m) showEditMemberModal(m); });
  $$('[data-del-m]').forEach(b=>b.onclick=async()=>{
    if(!confirm('Remove member? All their data will be removed.')) return;
    await api('DELETE',`/members/${b.dataset.delM}`);
    if(S.me?.id===parseInt(b.dataset.delM)){S.me=null;LS.set('casa_me',null);}
    await reload(); render(); toast('Member removed');
  });
  $$('[data-remind3]').forEach(b=>b.onclick=()=>{
    const n=S.balances.net_balances.find(x=>x.id===parseInt(b.dataset.remind3));
    const msg=`Hey ${b.dataset.n3}! Reminder — you owe ${fmt(Math.abs(n?.net||0))} on Casa 🏠 Settle up when you can!`;
    navigator.clipboard?.writeText(msg).then(()=>toast('📋 Copied!')).catch(()=>toast(msg));
  });
  $('#dark-btn2')?.addEventListener('click', ()=>{ S.darkMode=!S.darkMode; LS.set('casa_dark',S.darkMode); applyDarkMode(); render(); });
  $('#reset-me-btn')?.addEventListener('click', ()=>{ S.me=null; LS.set('casa_me',null); render(); });

  // Export JSON
  $('#export-btn')?.addEventListener('click', async()=>{
    try{
      const data=await fetch('/api/export').then(r=>r.json());
      // also include localStorage data
      data.local={reactions:S.reactions,comments:S.comments};
      const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
      a.download=`casa_backup_${todayStr()}.json`; a.click(); toast('✓ Export downloaded!');
    }catch{}
  });

  // Import JSON
  $('#import-btn')?.addEventListener('click', ()=>$('#import-file')?.click());
  $('#import-file')?.addEventListener('change', async(e)=>{
    const file=e.target.files[0]; if(!file) return;
    try{
      const text=await file.text(); const data=JSON.parse(text);
      if(data.local?.reactions) { S.reactions=data.local.reactions; LS.set('casa_reactions',S.reactions); }
      if(data.local?.comments)  { S.comments =data.local.comments;  LS.set('casa_comments', S.comments); }
      toast('✓ Local data imported! Server data must be restored manually.');
    }catch{ toast('Invalid JSON file'); }
  });

  // Export CSV
  const exportCsv = ()=>{
    const today=new Date(); const [ty,tm]=[today.getFullYear(),today.getMonth()+1];
    const monthExps=S.expenses.filter(e=>e.date?.startsWith(`${ty}-${String(tm).padStart(2,'0')}`));
    const rows=[['Date','Description','Amount','Paid By','Category',...S.members.map(m=>m.name+' share')]];
    monthExps.forEach(e=>{
      const shares=S.members.map(m=>{ const s=e.splits?.find(x=>x.member_id===m.id); return s?s.amount.toFixed(2):'0.00'; });
      rows.push([e.date,e.description,e.amount.toFixed(2),e.payer_name,e.category,...shares]);
    });
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=`casa_${ty}_${String(tm).padStart(2,'0')}.csv`; a.click(); toast('✓ CSV downloaded!');
  };
  $('#export-csv-btn')?.addEventListener('click', exportCsv);
  $('#export-csv-inline')?.addEventListener('click', exportCsv);
}

// ── Member forms ──────────────────────────────────────────────────────────
function memberFormHtml(m) {
  return `
    <div class="ig"><label class="lbl">Name</label>
      <input class="inp" id="mn" value="${m?.name||''}" placeholder="e.g. Sangini" autocomplete="off"></div>
    <div class="ig"><label class="lbl">Color</label>
      <div class="csws">${COLORS.map(c=>`<div class="csw ${(m?.color||COLORS[0])===c?'on':''}" data-mc="${c}" style="background:${c}"></div>`).join('')}</div></div>
    <div class="ig" style="margin-top:8px"><label class="lbl">Emoji</label>
      <div class="egrid">${EMOJIS.map(e=>`<div class="eo ${(m?.emoji||EMOJIS[0])===e?'on':''}" data-me="${e}">${e}</div>`).join('')}</div></div>`;
}

function bindMemberForm() {
  $$('[data-mc]').forEach(s=>s.onclick=()=>{ $$('[data-mc]').forEach(x=>x.classList.toggle('on',x===s)); });
  $$('[data-me]').forEach(e=>e.onclick=()=>{ $$('[data-me]').forEach(x=>x.classList.toggle('on',x===e)); });
  return ()=>({
    name:$('#mn')?.value.trim(),
    color:$('[data-mc].on')?.dataset.mc||COLORS[0],
    emoji:$('[data-me].on')?.dataset.me||EMOJIS[0],
  });
}

function showAddMemberModal() {
  showModal(`<div class="mo-title">Add Member 👤</div>${memberFormHtml(null)}
    <button class="btn btn-p btn-full" id="save-mem" style="margin-top:8px">Add Member</button>`);
  const getVals=bindMemberForm();
  $('#save-mem').onclick=async()=>{
    const {name,color,emoji}=getVals();
    if(!name){toast('Enter a name');return;}
    try{
      const nm=await api('POST','/members',{name,color,emoji});
      if(!S.me){S.me=nm;LS.set('casa_me',{id:nm.id});}
      closeModal(); await reload(); render(); toast(`✓ Welcome, ${name}!`);
    }catch{}
  };
}

function showEditMemberModal(m) {
  showModal(`<div class="mo-title">Edit ${m.name}</div>${memberFormHtml(m)}
    <button class="btn btn-p btn-full" id="save-mem" style="margin-top:8px">Save Changes</button>`);
  const getVals=bindMemberForm();
  $('#save-mem').onclick=async()=>{
    const {name,color,emoji}=getVals();
    if(!name){toast('Enter a name');return;}
    try{
      const updated=await api('PUT',`/members/${m.id}`,{name,color,emoji});
      if(S.me?.id===m.id){S.me=updated;LS.set('casa_me',{id:updated.id});}
      closeModal(); await reload(); render(); toast('✓ Updated!');
    }catch{}
  };
}

// ══ INIT ═══════════════════════════════════════════════════════════════════
async function init() {
  loadLocalData();
  render();
  try {
    await reload();
    const saved=LS.get('casa_me',null);
    if(saved?.id) S.me=S.members.find(m=>m.id===saved.id)||null;
  } finally {
    S.loading=false; render();
  }
}

init();
</script>
